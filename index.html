<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="head">
        <div id="title">
            <h1 id="inicio">My To-Do List</h1>
            <p style="color: #6E6D84;">Click on a card to change it's status</p>
            <p id="contador">0 tasks to-do</p>
        </div>
        <button id="agregarInfo">+  Add To-Do</button>
    </div>
    <div id="overlay">
    <div id="pestañaAgregar">
        <header id="headerPestaña">
            <span id="close">x</span>
            <h2>Add New To-Do</h2>
            <h3>Create a new to-do item. Click save when you're done</h3>
        </header>
        <label for="title" style="font-weight: bold;">Title</label>
        <div id="popup">
            <p>Please fill the title field!</p>
        </div>
        <input type="text" id="titulo" placeholder="Enter To-Do title">
        <label for="description" style="font-weight: bold;">Description</label>
        <input type="text" id="description" placeholder="Enter description">
        <button id="agregarTarea">Agregar</button>
    </div>
    </div>
    <div id="contenedorLista">
        <ul id="list">

        </ul>
    </div>
    <script src="script.js"></script>
</body>
