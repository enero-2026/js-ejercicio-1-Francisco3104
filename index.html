<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="head">
        <div id="title">
            <h1>My To-Do List</h1>
            <p>click on a card to change it's status</p>
        </div>
        <button id="agregarInfo">+  Add To-Do</button>
    </div>
    <div id="overlay">
    <div id="pestañaAgregar">
        <header>
            <span id="close">x</span>
            <h2>Add New To-Do</h2>
            <h3>Create a new to-do item. Click save when you're done</h3>
        </header>
        <label for="title">Title</label>
        <input type="text" id="titulo">
        <label for="description">Description</label>
        <input type="text" id="description">
        <button id="agregarTarea">Agregar</button>
    </div>
    </div>
    <div id="contenedorLista">
        <ul id="list">

        </ul>
    </div>
    <script src="script.js"></script>
</body>
